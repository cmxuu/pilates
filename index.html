      // Utility to clean thumbnails
      const getCleanThumbnail = (url) => {
        if (!url) return "";
        if (url.includes("ytimg.com") || url.includes("youtube.com")) {
          return url.replace("hqdefault.jpg", "mqdefault.jpg");
        }
        return url;
      };

      // Helper to find cached video log
      const findCachedVideo = (url, logsList) => {
        if (!url) return null;
        return logsList.find((l) => l.videoUrl === url);
      };

      // Client-side instant video analysis for 100% offline compatibility
      const extractVideoMetaClient = (url) => {
        let videoId = "";
        let thumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
        let title = "自主練習皮拉提斯課程";
        let tags = ["核心"];

        try {
          // Youtube Regex
          const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
          const ytMatch = url.match(ytRegex);
          if (ytMatch) {
            videoId = ytMatch[1];
            thumbnail = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            title = "YouTube 皮拉提斯課程";
          } else if (url.includes("vimeo.com")) {
            title = "Vimeo 運動課程影片";
            thumbnail = "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&q=80&w=600";
          }
        } catch (e) {
          console.error(e);
        }
        return { title, thumbnail, tags };
      };

      // CheckInPage Sub-component
      function CheckInPage({ logs, onAddLog, onDeleteLog, onUpdateLog, selectedDate, onSelectDate }) {
        const [workoutType, setWorkoutType] = useState("video");
        const [videoUrl, setVideoUrl] = useState("");
        const [isFetchingInfo, setIsFetchingInfo] = useState(false);
        const [fetchError, setFetchError] = useState(null);
        
        const [parsedMeta, setParsedMeta] = useState(null);
        const [customTitle, setCustomTitle] = useState("");
        const [duration, setDuration] = useState(15);
        const [notes, setNotes] = useState("");
        const [selectedTags, setSelectedTags] = useState([]);

        // Dialog edit/delete locks
        const [logToDelete, setLogToDelete] = useState(null);
        const [logToEditDuration, setLogToEditDuration] = useState(null);
        const [editingDuration, setEditingDuration] = useState(15);

        // Date Picker bounds
        const [currentYear, setCurrentYear] = useState(() => new Date().getFullYear());
        const [currentMonth, setCurrentMonth] = useState(() => new Date().getMonth());

        const [loggingProgress, setLoggingProgress] = useState(false);
        const [showAddForm, setShowAddForm] = useState(false);
        const [reformerPreset, setReformerPreset] = useState("https://pilates.app/reformer-class-pilates");

        // Dynamically extract physical courses from logs, newest first
        const physicalCourses = useMemo(() => {
          const map = new Map();

          // Seed default courses
          map.set("https://pilates.app/reformer-class-pilates", {
            url: "https://pilates.app/reformer-class-pilates",
            title: "器械皮拉提斯",
            thumbnail: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600",
            tags: ["器械", "實體"],
            duration: 60,
            latestTimestamp: 0,
          });

          map.set("https://pilates.app/reformer-class-sculpture", {
            url: "https://pilates.app/reformer-class-sculpture",
            title: "全方位體態雕塑",
            thumbnail: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&q=80&w=600",
            tags: ["器械", "實體"],
            duration: 60,
            latestTimestamp: 0,
          });

          logs.forEach((log) => {
            const isPhysical = (log.tags || []).includes("實體") || log.videoUrl.includes("reformer");
            if (isPhysical && log.videoUrl) {
              const existing = map.get(log.videoUrl);
              if (!existing || log.createdAt > existing.latestTimestamp) {
                map.set(log.videoUrl, {
                  url: log.videoUrl,
                  title: log.videoTitle,
                  thumbnail: log.videoThumbnail || "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600",
                  tags: log.tags || ["實體"],
                  duration: log.duration || 60,
                  latestTimestamp: log.createdAt || 0,
                });
              }
            }
          });

          return Array.from(map.values()).sort((a, b) => b.latestTimestamp - a.latestTimestamp);
        }, [logs]);

        // Preset state initialization
        useEffect(() => {
          if (workoutType === "reformer") {
            let targetUrl = "https://pilates.app/reformer-class-pilates";
            let fallbackTitle = "器械皮拉提斯";
            let fallbackThumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
            let fallbackTags = ["器械", "實體"];
            let fallbackDuration = 60;

            if (reformerPreset === "custom") {
              targetUrl = "https://pilates.app/reformer-class-custom";
              fallbackTitle = "自訂身體訓練課程";
              fallbackThumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
              fallbackTags = ["實體"];
              fallbackDuration = 60;
            } else {
              const presetCourse = physicalCourses.find(c => c.url === reformerPreset);
              if (presetCourse) {
                targetUrl = presetCourse.url;
                fallbackTitle = presetCourse.title;
                fallbackThumbnail = presetCourse.thumbnail;
                fallbackTags = presetCourse.tags;
                fallbackDuration = presetCourse.duration;
              }
            }

            const cached = findCachedVideo(targetUrl, logs);
            if (cached) {
              setVideoUrl(cached.videoUrl);
              setParsedMeta({
                title: cached.videoTitle,
                thumbnail: cached.videoThumbnail || fallbackThumbnail,
                tags: cached.tags || fallbackTags,
              });
              setCustomTitle(cached.videoTitle);
              setDuration(cached.duration || fallbackDuration);
              setSelectedTags(cached.tags || fallbackTags);
            } else {
              setVideoUrl(targetUrl);
              setParsedMeta({
                title: fallbackTitle,
                thumbnail: fallbackThumbnail,
                tags: fallbackTags,
              });
              setCustomTitle(reformerPreset === "custom" ? "" : fallbackTitle);
              setDuration(fallbackDuration);
              setSelectedTags(fallbackTags);
            }
          } else {
            setVideoUrl("");
            setParsedMeta(null);
            setCustomTitle("");
            setDuration(15);
            setSelectedTags([]);
          }
        }, [workoutType, reformerPreset, logs, physicalCourses]);

        useEffect(() => {
          const [year, month] = selectedDate.split("-").map(Number);
          if (year && month !== undefined) {
            setCurrentYear(year);
            setCurrentMonth(month - 1);
          }
        }, [selectedDate]);

        const handleFetchMetadata = () => {
          if (!videoUrl || !videoUrl.trim()) return;
          setIsFetchingInfo(true);
          setFetchError(null);

          setTimeout(() => {
            const cached = findCachedVideo(videoUrl.trim(), logs);
            if (cached) {
              setParsedMeta({
                title: cached.videoTitle,
                thumbnail: cached.videoThumbnail,
                tags: cached.tags || ["核心"],
              });
              setCustomTitle(cached.videoTitle);
              setDuration(cached.duration || 15);
              setSelectedTags(cached.tags || ["核心"]);
              setFetchError("✨ 已從歷史紀錄自動提取本影片資料");
            } else {
              const extracted = extractVideoMetaClient(videoUrl.trim());
              setParsedMeta(extracted);
              setCustomTitle(extracted.title);
              setDuration(15);
              setSelectedTags(extracted.tags);
            }
            setIsFetchingInfo(false);
          }, 350);
        };

        const handleToggleTag = (tag) => {
          if (selectedTags.includes(tag)) {
            setSelectedTags(selectedTags.filter((t) => t !== tag));
          } else {
            setSelectedTags([...selectedTags, tag]);
          }
        };

        const handleCreateCheckIn = async () => {
          if (!parsedMeta) return;
          setLoggingProgress(true);

          let finalUrl = videoUrl;
          const trimTitle = customTitle.trim() || parsedMeta.title;

          if (workoutType === "reformer") {
            if (reformerPreset === "custom") {
              finalUrl = "https://pilates.app/reformer-class-custom-" + encodeURIComponent(trimTitle || "untitled");
            } else {
              finalUrl = reformerPreset;
            }
          }

          setTimeout(async () => {
            const existingCourse = logs.find(l => l.videoUrl === finalUrl);
            const finalTags = (existingCourse && existingCourse.tags && existingCourse.tags.length > 0)
              ? existingCourse.tags
              : (workoutType === "reformer" ? ["實體"] : ["線上"]);

            await onAddLog({
              date: selectedDate,
              videoUrl: finalUrl,
              videoTitle: trimTitle || (workoutType === "reformer" ? "未命名實體課" : "未命名排課"),
              videoThumbnail: parsedMeta.thumbnail,
              tags: finalTags,
              notes: undefined,
              duration: duration || 15,
            });

            setVideoUrl("");
            setParsedMeta(null);
            setDuration(15);
            setShowAddForm(false);
            setLoggingProgress(false);
          }, 200);
        };

        // Date calculation structures
        const checkedDates = useMemo(() => {
          const dates = new Set();
          logs.forEach((log) => dates.add(log.date));
          return dates;
        }, [logs]);

        const stats = useMemo(() => {
          let currentStreak = 0;
          const todayStr = new Date().toISOString().split("T")[0];
          const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split("T")[0];

          if (checkedDates.has(todayStr) || checkedDates.has(yesterdayStr)) {
            let tempDate = checkedDates.has(todayStr) ? new Date(todayStr) : new Date(yesterdayStr);
            while (true) {
              const formattedDate = tempDate.toISOString().split("T")[0];
              if (checkedDates.has(formattedDate)) {
                currentStreak++;
                tempDate.setDate(tempDate.getDate() - 1);
              } else {
                break;
              }
            }
          }

          const monthPrefix = `${currentYear}-${(currentMonth + 1) < 10 ? "0" + (currentMonth + 1) : currentMonth + 1}`;
          const thisMonthWorkouts = logs.filter((log) => log.date.startsWith(monthPrefix)).length;

          return {
            currentStreak,
            thisMonthWorkouts,
            allTimeDays: checkedDates.size,
          };
        }, [checkedDates, logs, currentYear, currentMonth]);

        const selectedDateLogs = useMemo(() => {
          return logs.filter((log) => log.date === selectedDate);
        }, [logs, selectedDate]);

        const calendarDays = useMemo(() => {
          const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
          const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
          const prevMonthTotalDays = new Date(currentYear, currentMonth, 0).getDate();

          const daysList = [];
          for (let i = firstDayIndex - 1; i >= 0; i--) {
            const day = prevMonthTotalDays - i;
            const m = currentMonth === 0 ? 12 : currentMonth;
            const y = currentMonth === 0 ? currentYear - 1 : currentYear;
            daysList.push({
              day,
              dateString: `${y}-${m < 10 ? '0' + m : m}-${day < 10 ? '0' + day : day}`,
              isCurrentMonth: false,
            });
          }

          for (let i = 1; i <= totalDays; i++) {
            const m = currentMonth + 1;
            daysList.push({
              day: i,
              dateString: `${currentYear}-${m < 10 ? '0' + m : m}-${i < 10 ? '0' + i : i}`,
              isCurrentMonth: true,
            });
          }

          const remainingSlots = 42 - daysList.length;
          for (let i = 1; i <= remainingSlots; i++) {
            const m = currentMonth === 11 ? 1 : currentMonth + 2;
            const y = currentMonth === 11 ? currentYear + 1 : currentYear;
            daysList.push({
              day: i,
              dateString: `${y}-${m < 10 ? '0' + m : m}-${i < 10 ? '0' + i : i}`,
              isCurrentMonth: false,
            });
          }

          return daysList;
        }, [currentYear, currentMonth]);

        return (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
            {/* Left Column Calendar */}
            <div className="lg:col-span-7 space-y-6">
              
              {/* Dashboard Wall */}
              <div className="bg-white/40 backdrop-blur-xl border border-white/60 rounded-3xl p-5 shadow-xs">
                <div className="flex items-center gap-2 mb-4">
                  <div className="p-2 bg-indigo-50 text-indigo-600 rounded-xl">
                    <SVGIcon name="Sparkles" className="w-4 h-4 text-indigo-600" />
                  </div>
                  <h2 className="text-sm font-bold text-slate-800 tracking-wide">我的皮拉提斯打卡牆</h2>
                </div>
                
                <div className="grid grid-cols-3 gap-3">
                  <div className="bg-white/60 border border-white/80 rounded-2xl p-4 text-center">
                    <p className="text-xs text-slate-400 font-bold mb-1">連續打卡</p>
                    <div className="flex items-baseline justify-center gap-0.5">
                      <span className="text-2xl font-extrabold text-indigo-600">{stats.currentStreak}</span>
                      <span className="text-[10px] text-slate-500 font-medium">天</span>
                    </div>
                  </div>

                  <div className="bg-white/60 border border-white/80 rounded-2xl p-4 text-center">
                    <p className="text-xs text-slate-400 font-bold mb-1">本月練習</p>
                    <div className="flex items-baseline justify-center gap-0.5">
                      <span className="text-2xl font-extrabold text-slate-700">{stats.thisMonthWorkouts}</span>
                      <span className="text-[10px] text-slate-500 font-medium">次</span>
                    </div>
                  </div>

                  <div className="bg-white/60 border border-white/80 rounded-2xl p-4 text-center">
                    <p className="text-xs text-slate-400 font-bold mb-1">累計打卡</p>
                    <div className="flex items-baseline justify-center gap-0.5">
                      <span className="text-2xl font-extrabold text-slate-700">{stats.allTimeDays}</span>
                      <span className="text-[10px] text-slate-500 font-medium">天</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* Dynamic Calendar Grid */}
              <div className="bg-white/50 backdrop-blur-xl border border-white/80 rounded-[2rem] shadow-xs p-6">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-lg font-bold text-slate-900">
                    {currentYear} 年 {currentMonth + 1} 月
                  </h2>
                  <div className="flex items-center gap-1">
                    <button
                      onClick={() => {
                        if (currentMonth === 0) {
                          setCurrentMonth(11);
                          setCurrentYear(y => y - 1);
                        } else {
                          setCurrentMonth(m => m - 1);
                        }
                      }}
                      className="p-2 border border-white/60 bg-white/40 rounded-xl hover:bg-white/70 text-slate-600 transition"
                    >
                      <SVGIcon name="ChevronLeft" className="w-4 h-4" />
                    </button>
                    <button
                      onClick={() => {
                        if (currentMonth === 11) {
                          setCurrentMonth(0);
                          setCurrentYear(y => y + 1);
                        } else {
                          setCurrentMonth(m => m + 1);
                        }
                      }}
                      className="p-2 border border-white/60 bg-white/40 rounded-xl hover:bg-white/70 text-slate-600 transition"
                    >
                      <SVGIcon name="ChevronRight" className="w-4 h-4" />
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-7 gap-1 text-center mb-2">
                  {["日", "一", "二", "三", "四", "五", "六"].map((w, idx) => (
                    <span
                      key={w}
                      className={`text-[11px] font-bold py-1.5 ${
                        idx === 0 || idx === 6 ? "text-rose-400/80" : "text-slate-500"
                      }`}
                    >
                      {w}
                    </span>
                  ))}
                </div>

                <div className="grid grid-cols-7 gap-y-2 gap-x-1.5">
                  {calendarDays.map((item, idx) => {
                    const isChecked = checkedDates.has(item.dateString);
                    const isSelected = selectedDate === item.dateString;
                    const isToday = new Date().toISOString().split("T")[0] === item.dateString;

                    return (
                      <button
                        key={idx}
                        onClick={() => onSelectDate(item.dateString)}
                        className={`relative py-3.5 rounded-2xl flex flex-col items-center justify-center transition cursor-pointer text-xs font-bold ${
                          isSelected
                            ? "bg-indigo-600 text-white shadow-lg shadow-indigo-100 scale-103"
                            : isToday
                            ? "bg-indigo-50/80 text-indigo-700 hover:bg-indigo-150/80 border border-indigo-200/40"
                            : item.isCurrentMonth
                            ? "text-slate-800 hover:bg-white/65"
                            : "text-slate-350 hover:bg-white/40"
                        }`}
                      >
                        <span className="text-[13px]">{item.day}</span>
                        {isChecked && (
                          <span
                            className={`absolute bottom-1 w-1.5 h-1.5 rounded-full ${
                              isSelected ? "bg-white" : "bg-indigo-600"
                            }`}
                          />
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Right Column Check-In Form and Logs */}
            <div className="lg:col-span-5 space-y-6">
              
              {/* Expandable Add form */}
              {showAddForm && (
                <div className="bg-white/55 backdrop-blur-md border border-white/80 rounded-3xl p-5 space-y-4 shadow-xs animate-fade-in">
                  <div className="flex justify-between items-center border-b border-slate-100 pb-2.5">
                    <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <SVGIcon name="BookmarkCheck" className="w-4 h-4 text-indigo-500" />
                      <span>新增訓練打卡</span>
                    </span>
                    <button
                      onClick={() => {
                        setShowAddForm(false);
                        setParsedMeta(null);
                        setVideoUrl("");
                      }}
                      className="text-slate-400 hover:text-slate-600 p-1"
                    >
                      ✕
                    </button>
                  </div>

                  {/* Workout Type Selector */}
                  <div className="space-y-1.5">
                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">訓練方式</label>
                    <div className="bg-white/40 border border-white/80 p-0.5 rounded-xl flex">
                      <button
                        type="button"
                        onClick={() => setWorkoutType("video")}
                        className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                          workoutType === "video" ? "bg-white text-indigo-600 shadow-xs" : "text-slate-500 hover:text-slate-800"
                        }`}
                      >
                        <SVGIcon name="Video" className="w-3.5 h-3.5" />
                        <span>線上影片</span>
                      </button>
                      <button
                        type="button"
                        onClick={() => setWorkoutType("reformer")}
                        className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                          workoutType === "reformer" ? "bg-white text-indigo-600 shadow-xs" : "text-slate-500 hover:text-slate-800"
                        }`}
                      >
                        <SVGIcon name="Sparkles" className="w-3.5 h-3.5 text-indigo-600" />
                        <span>實體課程</span>
                      </button>
                    </div>
                  </div>

                  {/* Fields conditionally based on selection */}
                  {workoutType === "video" ? (
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">輸入影片網址</label>
                      <div className="flex gap-2">
                        <div className="relative flex-1">
                          <input
                            type="text"
                            value={videoUrl}
                            onChange={(e) => setVideoUrl(e.target.value)}
                            placeholder="Youtube 或 Vimeo 網址..."
                            className="w-full pl-3 pr-8 py-2 bg-white/50 border border-white/80 rounded-xl text-xs text-slate-800 focus:outline-none focus:ring-1.5 focus:ring-indigo-400/.5"
                          />
                          {videoUrl && (
                            <button onClick={() => setVideoUrl("")} className="absolute right-2.5 top-2.5 text-slate-400 hover:text-slate-600 text-xs">✕</button>
                          )}
                        </div>
                        <button
                          type="button"
                          disabled={isFetchingInfo || !videoUrl.trim()}
                          onClick={handleFetchMetadata}
                          className="px-3.5 bg-slate-900 border border-slate-950 rounded-xl text-white text-xs font-bold hover:bg-slate-850 disabled:opacity-40"
                        >
                          自動分析
                        </button>
                      </div>
                      {fetchError && (
                        <p className="text-[10px] text-rose-600 bg-rose-50 border border-rose-100 p-2.5 rounded-lg animate-pulse">{fetchError}</p>
                      )}
                    </div>
                  ) : (
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">課程主選單</label>
                      <select
                        value={reformerPreset}
                        onChange={(e) => setReformerPreset(e.target.value)}
                        className="w-full px-3 py-2 bg-white/50 border border-white/80 rounded-xl text-xs text-slate-800 focus:outline-none"
                      >
                        {physicalCourses.map((course) => (
                          <option key={course.url} value={course.url}>
                            {course.title}
                          </option>
                        ))}
                        <option value="custom">＋ 自訂自組課程（可自行新增課程名稱）</option>
                      </select>
                    </div>
                  )}

                  {/* Metadata display & customize forms */}
                  {parsedMeta && (
                    <div className="space-y-4 pt-2.5 border-t border-slate-100 animate-fade-in">
                      <div className="flex gap-3 bg-white/75 p-2 border border-white/95 rounded-2xl">
                        <div className="relative w-28 h-20 overflow-hidden rounded-xl border border-white/85 shrink-0 bg-white">
                          <img
                            src={getCleanThumbnail(parsedMeta.thumbnail)}
                            alt="Preview Thumbnail"
                            className="w-full h-full object-cover"
                          />
                        </div>
                        <div className="space-y-1 overflow-hidden flex-1">
                          <span className="text-[9px] font-bold bg-indigo-50 text-indigo-700 px-1.5 py-0.5 rounded uppercase font-sans">
                            {workoutType === "reformer" ? "實體課堂模式" : "線上連結已載入"}
                          </span>
                          <p className="text-xs text-slate-800 font-bold truncate leading-tight">
                            {customTitle || "請輸入課程名稱"}
                          </p>
                          <p className="text-[10px] text-slate-400 truncate">{videoUrl}</p>
                        </div>
                      </div>

                      {/* Course Title Field */}
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">課程名稱</label>
                        <input
                          type="text"
                          value={customTitle}
                          onChange={(e) => setCustomTitle(e.target.value)}
                          disabled={workoutType === "reformer" && reformerPreset !== "custom"}
                          placeholder="請輸入課程名稱..."
                          className="w-full px-3 py-2 border border-slate-200 bg-white/50 rounded-xl text-xs"
                        />
                      </div>

                      {/* Duration Field */}
                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">訓練時長 (分鐘)</label>
                        <div className="relative">
                          <input
                            type="number"
                            min={1}
                            max={180}
                            value={duration}
                            onChange={(e) => setDuration(Math.max(1, Number(e.target.value)))}
                            disabled={workoutType === "reformer" && reformerPreset !== "custom"}
                            className="w-full pl-3 pr-8 py-2 border border-slate-200 bg-white/50 rounded-xl text-xs font-sans"
                          />
                          <span className="absolute right-3 top-2.5 text-[10px] text-slate-400 font-bold font-sans">MINS</span>
                        </div>
                      </div>

                      {/* Submit */}
                      <button
                        type="button"
                        disabled={loggingProgress}
                        onClick={handleCreateCheckIn}
                        className="w-full py-2.5 bg-slate-950 text-white text-xs font-bold rounded-xl shadow-lg transition hover:bg-slate-850 flex justify-center items-center gap-1.5"
                      >
                        {loggingProgress ? (
                          <div className="w-3.5 h-3.5 border-2 border-indigo-400 border-t-transparent animate-spin rounded-full"></div>
                        ) : (
                          <>
                            <SVGIcon name="CheckCircle2" className="w-3.5 h-3.5 text-indigo-400" />
                            <span>儲存並確認打卡</span>
                          </>
                        )}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Day logs list */}
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <h4 className="text-sm font-bold text-slate-800 font-sans flex items-center gap-1.5">
                    <span>{parseInt(selectedDate.split("-")[1])}月{parseInt(selectedDate.split("-")[2])}日 的訓練牆</span>
                    <span className="text-xs text-slate-400 font-normal">({selectedDateLogs.length} 筆)</span>
                  </h4>

                  <button
                    onClick={() => setShowAddForm(!showAddForm)}
                    className="flex items-center gap-1 px-3 py-1.5 bg-slate-950 text-white text-xs font-bold rounded-xl shadow-xs hover:bg-slate-800"
                  >
                    <SVGIcon name="Plus" className="w-3.5 h-3.5" />
                    <span>新增</span>
                  </button>
                </div>

                {selectedDateLogs.length === 0 ? (
                  <div className="bg-white/30 backdrop-blur-xs border border-white/60 border-dashed rounded-3xl p-8 text-center text-slate-400 space-y-2">
                    <div className="flex justify-center">
                      <SVGIcon name="Video" className="w-8 h-8 text-slate-350" />
                    </div>
                    <p className="text-xs font-bold text-slate-500">此日期尚無任何訓練打卡紀錄</p>
                    <p className="text-[11px] text-slate-400 leading-normal max-w-xs mx-auto">
                      點選月曆中具有圓點的日期以查看歷史課表，新訓練請直接按右上「新增」打卡！
                    </p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {selectedDateLogs.map((log) => (
                      <div
                        key={log.id}
                        className="bg-white/60 hover:bg-white/70 border border-white/80 rounded-2xl overflow-hidden shadow-2xs hover:shadow-xs transition duration-200 group relative"
                      >
                        <div className="flex items-stretch h-[84px] shrink-0">
                          {/* Left Thumbnail */}
                          <div className="relative w-32 shrink-0 bg-slate-50 overflow-hidden">
                            <img
                              src={getCleanThumbnail(log.videoThumbnail)}
                              alt="Log Preview"
                              className="absolute inset-0 w-full h-full object-cover"
                            />
                            {log.videoUrl.includes("reformer") ? null : (
                              <a
                                href={log.videoUrl}
                                target="_blank"
                                rel="noreferrer"
                                className="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-white text-[10px] font-bold"
                              >
                                <SVGIcon name="ExternalLink" className="w-3.5 h-3.5 mr-0.5" />
                                播放
                              </a>
                            )}
                          </div>

                          {/* Detail Metadata */}
                          <div className="p-3 select-none flex-1 min-w-0 flex flex-col justify-between">
                            <h5 className="text-[12px] font-bold text-slate-800 leading-tight truncate">
                              {log.videoTitle}
                            </h5>

                            <div className="flex items-center gap-1.5 text-[10px] text-slate-550 font-medium">
                              <SVGIcon name="Clock" className="w-3.5 h-3.5 text-slate-400 shrink-0" />
                              <span>約 {log.duration || 15} 分鐘</span>
                            </div>

                            <div className="flex justify-between items-center gap-1.5">
                              <div className="flex flex-wrap gap-0.5 max-h-4.5 overflow-hidden">
                                {log.tags && log.tags.length > 0 ? (
                                  log.tags.map((tag) => (
                                    <span
                                      key={tag}
                                      className="px-1.5 py-0.5 text-[8px] font-bold bg-indigo-50/70 border border-indigo-100/30 text-indigo-700 rounded"
                                    >
                                      {tag}
                                    </span>
                                  ))
                                ) : (
                                  <span className="text-[8px] text-slate-400 italic">無</span>
                                )}
                              </div>

                              {/* Editing triggers */}
                              <div className="flex items-center gap-1 shrink-0">
                                <button
                                  onClick={() => {
                                    setLogToEditDuration(log);
                                    setEditingDuration(log.duration || 15);
                                  }}
                                  className="text-slate-400 hover:text-indigo-600 p-1"
                                  title="修改時長"
                                >
                                  <SVGIcon name="FileEdit" className="w-3.5 h-3.5" />
                                </button>
                                <button
                                  onClick={() => setLogToDelete(log)}
                                  className="text-slate-400 hover:text-rose-600 p-1"
                                  title="刪除"
                                >
                                  <SVGIcon name="Trash2" className="w-3.5 h-3.5" />
                                </button>
                              </div>
                            </div>
                          </div>
                        </div>

                        {/* Optional feedback comments note banner at the bottom */}
                        {log.notes && (
                          <div className="bg-white/40 px-3 py-1.5 text-[10px] text-slate-600 leading-relaxed flex items-start gap-1.5 border-t border-white/80">
                            <SVGIcon name="FileText" className="w-3" />
                            <span>{log.notes}</span>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Inner Delete Confirmation Modals */}
            {logToDelete && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex items-center gap-3 text-rose-600">
                    <div className="p-2.5 bg-rose-50 rounded-2xl">
                      <SVGIcon name="Trash2" className="w-5 h-5" />
                    </div>
                    <h4 className="text-sm font-bold text-slate-800">確認刪除此訓練打卡記錄？</h4>
                  </div>
                  <div className="flex gap-2.5 pt-1.5">
                    <button
                      onClick={() => setLogToDelete(null)}
                      className="flex-1 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl"
                    >
                      取消
                    </button>
                    <button
                      onClick={async () => {
                        await onDeleteLog(logToDelete.id);
                        setLogToDelete(null);
                      }}
                      className="flex-1 py-2 bg-rose-600 text-white text-xs font-bold rounded-xl shadow-md cursor-pointer"
                    >
                      確認刪除
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}

            {/* Edit Duration Modal Box */}
            {logToEditDuration && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex items-center gap-3 text-indigo-600">
                    <div className="p-2.5 bg-indigo-50 rounded-2xl">
                      <SVGIcon name="FileEdit" className="w-5 h-5 text-indigo-600" />
                    </div>
                    <h4 className="text-sm font-bold text-slate-800">修改訓練時長</h4>
                  </div>
                  <div className="space-y-2">
                    <p className="text-[11px] text-slate-500">請更新「{logToEditDuration.videoTitle}」的本次訓練時長：</p>
                    <div className="flex items-center gap-2">
                      <input
                        type="number"
                        min={1}
                        max={180}
                        value={editingDuration}
                        onChange={(e) => setEditingDuration(Math.max(1, Number(e.target.value)))}

                  </div>

                      取消
                    </button>

            )}

        );
      }

      // VideoRecordsPage Sub-component
      function VideoRecordsPage({ logs, onQuickCheckIn, onUpdateLog }) {
        const [searchQuery, setSearchQuery] = useState("");
        const [selectedTag, setSelectedTag] = useState("全部");
        const [sortBy, setSortBy] = useState("latest");

        const [quickLogVideo, setQuickLogVideo] = useState(null);
        const [quickDuration, setQuickDuration] = useState(15);
        const [quickNotes, setQuickNotes] = useState("");
        const [isSubmitting, setIsSubmitting] = useState(false);

        const [editingTagsVideo, setEditingTagsVideo] = useState(null);
        const [editingVideoTitle, setEditingVideoTitle] = useState("");
        const [tagFormSelected, setTagFormSelected] = useState([]);
        const [editingVideoThumbnail, setEditingVideoThumbnail] = useState("");
        const [isSavingTags, setIsSavingTags] = useState(false);

        const [pinnedUrls, setPinnedUrls] = useState(() => {
          try {
            return JSON.parse(localStorage.getItem(PIN_STORAGE_KEY) || "[]");
          } catch {
            return [];
          }
        });

        const togglePin = (url) => {
          const next = pinnedUrls.includes(url) ? pinnedUrls.filter(u => u !== url) : [...pinnedUrls, url];
          setPinnedUrls(next);
          localStorage.setItem(PIN_STORAGE_KEY, JSON.stringify(next));
        };

        const uniqueVideos = useMemo(() => {
          const map = new Map();
          logs.forEach((log) => {
            const existing = map.get(log.videoUrl);
            if (existing) {
              existing.practiceCount += 1;
              if (log.date > existing.latestPracticeDate) {
                existing.latestPracticeDate = log.date;
                existing.videoTitle = log.videoTitle;
                existing.videoThumbnail = log.videoThumbnail;
                existing.tags = Array.from(new Set([...existing.tags, ...(log.tags || [])]));
                existing.latestDuration = log.duration || 15;
              }
              if (log.createdAt > existing.latestTimestamp) {
                existing.latestTimestamp = log.createdAt;
                existing.latestDuration = log.duration || existing.latestDuration || 15;
              }
            } else {
              map.set(log.videoUrl, {
                videoUrl: log.videoUrl,
                videoTitle: log.videoTitle,
                videoThumbnail: log.videoThumbnail,
                tags: [...(log.tags || [])],
                practiceCount: 1,
                latestPracticeDate: log.date,
                latestTimestamp: log.createdAt,
                latestDuration: log.duration || 15,
              });
            }
          });
          return Array.from(map.values());
        }, [logs]);

        const filteredVideos = useMemo(() => {
          const list = uniqueVideos.filter((v) => {
            const matchesSearch = v.videoTitle.toLowerCase().includes(searchQuery.toLowerCase());
            let matchesTag = false;

            if (selectedTag === "全部") {
              matchesTag = true;
            } else if (selectedTag === "線上") {
              matchesTag = !v.videoUrl.includes("reformer") && !v.tags.includes("實體");
            } else if (selectedTag === "實體") {
              matchesTag = v.videoUrl.includes("reformer") || v.tags.includes("實體");
            } else {
              const normalizedTags = v.tags.map(t => t.toLowerCase());
              matchesTag = normalizedTags.some(t => t.includes(selectedTag.toLowerCase()));
            }

            return matchesSearch && matchesTag;
          });

          if (sortBy === "latest") {
            list.sort((a, b) => b.latestPracticeDate.localeCompare(a.latestPracticeDate));
          } else {
            list.sort((a, b) => b.practiceCount - a.practiceCount);
          }

          const pinned = list.filter(v => pinnedUrls.includes(v.videoUrl));
          const unpinned = list.filter(v => !pinnedUrls.includes(v.videoUrl));
          return [...pinned, ...unpinned];
        }, [uniqueVideos, searchQuery, selectedTag, sortBy, pinnedUrls]);

        const handleQuickLogSubmit = async () => {
          if (!quickLogVideo) return;
          setIsSubmitting(true);
          const todayStr = new Date().toISOString().split("T")[0];

          setTimeout(async () => {
            await onQuickCheckIn({
              date: todayStr,
              videoUrl: quickLogVideo.videoUrl,
              videoTitle: quickLogVideo.videoTitle,
              videoThumbnail: quickLogVideo.videoThumbnail,
              tags: quickLogVideo.tags,
              duration: quickDuration,
              notes: quickNotes.trim() || undefined,
            });
            setIsSubmitting(false);
            setQuickLogVideo(null);
            setQuickNotes("");
            setQuickDuration(15);
          }, 200);
        };

        const handleSaveTags = () => {
          if (!editingTagsVideo) return;
          setIsSavingTags(true);

          setTimeout(async () => {
            const logsToUpdate = logs.filter(log => log.videoUrl === editingTagsVideo.videoUrl);
            for (const log of logsToUpdate) {
              await onUpdateLog(log.id, {
                videoTitle: editingVideoTitle.trim() || log.videoTitle,
                tags: tagFormSelected,

            setEditingTagsVideo(null);

        const handleToggleTagInForm = (tag) => {

                      {/* Card visual elements */}

                            {video.tags && video.tags.length > 2 && (

                              <span>再次上課</span>

                  );
                })}

            {/* Standalone Modal Boxes */}

      // App Entry Container
      function App() {
        const [logs, setLogs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [activeTab, setActiveTab] = useState("check-in");

        // Selected Calendar date string
        const [selectedDate, setSelectedDate] = useState(() => {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, "0");
          const dd = String(today.getDate()).padStart(2, "0");
          return `${yyyy}-${mm}-${dd}`;
        });

        // Load logs from Local Storage
        useEffect(() => {
          try {
            const stored = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (stored) {
              const parsed = JSON.parse(stored);
              parsed.sort((a, b) => {
                const datesDiff = b.date.localeCompare(a.date);
                if (datesDiff !== 0) return datesDiff;
                return b.createdAt - a.createdAt;
              });
              setLogs(parsed);
            }
          } catch (e) {
            console.error(e);
          } finally {
            setLoading(false);
          }
        }, []);

        const saveToLocal = (updated) => {
          setLogs(updated);
          try {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated));
          } catch (e) {
            console.error(e);
          }
        };

        const addLog = async (logData) => {
          const id = "log_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
          const createdAt = Date.now();
          const newLog = { ...logData, id, createdAt };

          const updated = [newLog, ...logs].sort((a, b) => {
            const dd = b.date.localeCompare(a.date);
            if (dd !== 0) return dd;
            return b.createdAt - a.createdAt;
          });
          saveToLocal(updated);
        };

        const deleteLog = async (id) => {
          const updated = logs.filter(l => l.id !== id);
          saveToLocal(updated);
        };

        const updateLog = async (id, fields) => {
          const updated = logs.map(l => l.id === id ? { ...l, ...fields } : l);
          saveToLocal(updated);
        };

        return (
          <div className="min-h-screen pb-16 font-sans relative overflow-hidden">
            {/* Ambient Wall Mesh Gradients */}
            <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-pink-200/50 blur-[130px] rounded-full pointer-events-none z-0"></div>
            <div className="absolute bottom-[5%] right-[-10%] w-[60%] h-[60%] bg-indigo-100/40 blur-[140px] rounded-full pointer-events-none z-0"></div>
            <div className="absolute top-[25%] right-[10%] w-[40%] h-[40%] bg-amber-100/40 blur-[110px] rounded-full pointer-events-none z-0"></div>

            {/* Navigation Header bar bar */}
            <header className="fixed top-0 left-0 right-0 z-40 bg-white/40 backdrop-blur-xl border-b border-white/60 shadow-xs">
              <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between relative z-10">
                <div className="flex items-center gap-2.5">
                  <div className="p-2 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <SVGIcon name="Flower" className="w-5 h-5 text-indigo-100" />
                  </div>
                  <h1 className="text-sm font-extrabold text-slate-900 tracking-tight">皮拉提斯訓練紀錄</h1>
                </div>

                {/* Switching Tabs */}
                <div className="bg-white/60 backdrop-blur-md border border-white/85 p-1 rounded-xl flex items-center gap-1 shadow-2xs">
                  <button
                    onClick={() => setActiveTab("check-in")}
                    className={`p-2 rounded-lg transition-all cursor-pointer flex items-center justify-center ${
                      activeTab === "check-in"
                        ? "bg-white text-indigo-600 shadow-xs scale-102 border border-white/80"
                        : "text-slate-500 hover:text-slate-800"
                    }`}
                    title="加簽打卡牆"
                  >
                    <SVGIcon name="CalendarDays" className="w-4 h-4" />
                  </button>
                  <button
                    onClick={() => setActiveTab("videos")}
                    className={`p-2 rounded-lg transition-all cursor-pointer flex items-center justify-center ${
                      activeTab === "videos"
                        ? "bg-white text-indigo-600 shadow-xs scale-102 border border-white/80"
                        : "text-slate-500 hover:text-slate-800"
                    }`}
                    title="影片影片庫"
                  >
                    <SVGIcon name="Video" className="w-4 h-4" />
                  </button>
                </div>
              </div>
            </header>

            {/* Main view container layout */}
            <main className="max-w-7xl mx-auto px-4 md:px-6 pt-24 pb-8 relative z-10">
              {loading ? (
                <div className="py-24 text-center space-y-4">
                  <div className="inline-block p-4 bg-white/60 backdrop-blur-md border border-white/80 rounded-3xl shadow-xs">
                    <div className="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                  <p className="text-xs font-bold text-slate-755">正在準備您的運動日誌模組...</p>
                </div>
              ) : (
                <div className="animate-fade-in">
                  {activeTab === "check-in" ? (
                    <CheckInPage
                      logs={logs}
                      onAddLog={addLog}
                      onDeleteLog={deleteLog}
                      onUpdateLog={updateLog}
                      selectedDate={selectedDate}
                      onSelectDate={setSelectedDate}
                    />
                  ) : (
                    <VideoRecordsPage
                      logs={logs}
                      onQuickCheckIn={addLog}
                      onUpdateLog={updateLog}
                    />
                  )}
                </div>
              )}
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
