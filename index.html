      /**
       * 工具函式區塊
       */
      // 轉換 YouTube 縮圖為最高畫質
      const getCleanThumbnail = (url) => {
        if (!url) return "";
        if (url.includes("ytimg.com") || url.includes("youtube.com")) {
          return url.replace("mqdefault.jpg", "maxresdefault.jpg").replace("hqdefault.jpg", "maxresdefault.jpg");
        }
        return url;
      };

      // 檢查是否已存在相同的影片紀錄
      const findCachedVideo = (url, logsList) => {
        if (!url) return null;
        return logsList.find((l) => l.videoUrl === url);
      };

      // 解析影片網址的 Metadata (僅支援部分 YouTube 及 Vimeo 特徵)
      const extractVideoMetaClient = (url) => {
        let videoId = "";
        let thumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
        let title = "自主練習皮拉提斯課程";
        let tags = ["核心"];

        try {
          const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
          const ytMatch = url.match(ytRegex);
          if (ytMatch) {
            videoId = ytMatch[1];
            thumbnail = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            title = "YouTube 皮拉提斯課程";
          } else if (url.includes("vimeo.com")) {
            title = "Vimeo 運動課程影片";
            thumbnail = "https://www.wlan-business.org/wp-content/uploads/2022/03/noimage-1-760x460-1.png";
          }
        } catch (e) {
          console.error(e);
        }
        return { title, thumbnail, tags };
      };

      /**
       * 首頁打卡頁面元件
       * 包含日曆顯示、新增訓練紀錄、以及檢視當日清單功能
       */
      function CheckInPage({ logs, onAddLog, onDeleteLog, onUpdateLog, selectedDate, onSelectDate, menstrualDates, onToggleMenstrualDate }) {
        // 表單相關狀態
        const [workoutType, setWorkoutType] = useState("video");
        const [videoUrl, setVideoUrl] = useState("");
        const [isFetchingInfo, setIsFetchingInfo] = useState(false);
        const [fetchError, setFetchError] = useState(null);
        
        const [parsedMeta, setParsedMeta] = useState(null);
        const [customTitle, setCustomTitle] = useState("");
        const [duration, setDuration] = useState(15);
        const [selectedTags, setSelectedTags] = useState([]);

        // 刪除與編輯時長視窗狀態
        const [logToDelete, setLogToDelete] = useState(null);
        const [logToEditDuration, setLogToEditDuration] = useState(null);
        const [editingDuration, setEditingDuration] = useState(15);

        // 日曆狀態
        const [currentYear, setCurrentYear] = useState(() => new Date().getFullYear());
        const [currentMonth, setCurrentMonth] = useState(() => new Date().getMonth());

        // UI 狀態
        const [loggingProgress, setLoggingProgress] = useState(false);
        const [showAddForm, setShowAddForm] = useState(false);
        const [isMenstrualEditMode, setIsMenstrualEditMode] = useState(false);
        const [reformerPreset, setReformerPreset] = useState("https://pilates.app/reformer-class-pilates");

        // 整理實體課程清單 (預設課程 + 歷史紀錄解析)
        const physicalCourses = useMemo(() => {
          const map = new Map();
          map.set("https://pilates.app/reformer-class-pilates", {
            url: "https://pilates.app/reformer-class-pilates",
            title: "器械皮拉提斯",
            thumbnail: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600",
            tags: ["器械", "實體"],
            duration: 60,
            latestTimestamp: 0,
          });

          map.set("https://pilates.app/reformer-class-sculpture", {
            url: "https://pilates.app/reformer-class-sculpture",
            title: "全方位體態雕塑",
            thumbnail: "https://www.wlan-business.org/wp-content/uploads/2022/03/noimage-1-760x460-1.png",
            tags: ["器械", "實體"],
            duration: 60,
            latestTimestamp: 0,
          });

          logs.forEach((log) => {
            const isPhysical = (log.tags || []).includes("實體") || log.videoUrl.includes("reformer");
            if (isPhysical && log.videoUrl) {
              const existing = map.get(log.videoUrl);
              if (!existing || log.createdAt > existing.latestTimestamp) {
                map.set(log.videoUrl, {
                  url: log.videoUrl,
                  title: log.videoTitle,
                  thumbnail: log.videoThumbnail || "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600",
                  tags: log.tags || ["實體"],
                  duration: log.duration || 60,
                  latestTimestamp: log.createdAt || 0,
                });
              }
            }
          });
          return Array.from(map.values()).sort((a, b) => b.latestTimestamp - a.latestTimestamp);
        }, [logs]);

        // 當訓練類型改變或實體課程預設值改變時，自動設定表單初始值
        useEffect(() => {
          if (workoutType === "reformer") {
            let targetUrl = "https://pilates.app/reformer-class-pilates";
            let fallbackTitle = "器械皮拉提斯";
            let fallbackThumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
            let fallbackTags = ["器械", "實體"];
            let fallbackDuration = 60;

            if (reformerPreset === "custom") {
              targetUrl = "https://pilates.app/reformer-class-custom";
              fallbackTitle = "自訂身體訓練課程";
              fallbackThumbnail = "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600";
              fallbackTags = ["實體"];
              fallbackDuration = 60;
            } else {
              const presetCourse = physicalCourses.find(c => c.url === reformerPreset);
              if (presetCourse) {
                targetUrl = presetCourse.url;
                fallbackTitle = presetCourse.title;
                fallbackThumbnail = presetCourse.thumbnail;
                fallbackTags = presetCourse.tags;
                fallbackDuration = presetCourse.duration;
              }
            }

            const cached = findCachedVideo(targetUrl, logs);
            if (cached) {
              setVideoUrl(cached.videoUrl);
              setParsedMeta({
                title: cached.videoTitle,
                thumbnail: cached.videoThumbnail || fallbackThumbnail,
                tags: cached.tags || fallbackTags,
              });
              setCustomTitle(cached.videoTitle);
              setDuration(cached.duration || fallbackDuration);
              setSelectedTags(cached.tags || fallbackTags);
            } else {
              setVideoUrl(targetUrl);
              setParsedMeta({
                title: fallbackTitle,
                thumbnail: fallbackThumbnail,
                tags: fallbackTags,
              });
              setCustomTitle(reformerPreset === "custom" ? "" : fallbackTitle);
              setDuration(fallbackDuration);
              setSelectedTags(fallbackTags);
            }
          } else {
            setVideoUrl("");
            setParsedMeta(null);
            setCustomTitle("");
            setDuration(15);
            setSelectedTags([]);
          }
        }, [workoutType, reformerPreset, logs, physicalCourses]);

        // 日期變動時，同步變更日曆的年份與月份
        useEffect(() => {
          const [year, month] = selectedDate.split("-").map(Number);
          if (year && month !== undefined) {
            setCurrentYear(year);
            setCurrentMonth(month - 1);
          }
        }, [selectedDate]);

        // 取得影片的中繼資料(Metadata)
        const handleFetchMetadata = () => {
          if (!videoUrl || !videoUrl.trim()) return;
          setIsFetchingInfo(true);
          setFetchError(null);

          setTimeout(() => {
            const cached = findCachedVideo(videoUrl.trim(), logs);
            if (cached) {
              setParsedMeta({
                title: cached.videoTitle,
                thumbnail: cached.videoThumbnail,
                tags: cached.tags || ["核心"],
              });
              setCustomTitle(cached.videoTitle);
              setDuration(cached.duration || 15);
              setSelectedTags(cached.tags || ["核心"]);
              setFetchError("已從歷史紀錄提取影片資料");
            } else {
              const extracted = extractVideoMetaClient(videoUrl.trim());
              setParsedMeta(extracted);
              setCustomTitle(extracted.title);
              setDuration(15);
              setSelectedTags(extracted.tags);
            }
            setIsFetchingInfo(false);
          }, 350);
        };

        // 新增打卡紀錄邏輯
        const handleCreateCheckIn = async () => {
          if (!parsedMeta) return;
          setLoggingProgress(true);

          let finalUrl = videoUrl;
          const trimTitle = customTitle.trim() || parsedMeta.title;

          if (workoutType === "reformer") {
            if (reformerPreset === "custom") {
              finalUrl = "https://pilates.app/reformer-class-custom-" + encodeURIComponent(trimTitle || "untitled");
            } else {
              finalUrl = reformerPreset;
            }
          }

          setTimeout(async () => {
            const existingCourse = logs.find(l => l.videoUrl === finalUrl);
            
            let finalTags = [];
            if (existingCourse && existingCourse.tags && existingCourse.tags.length > 0) {
              finalTags = existingCourse.tags;
            } else {
              finalTags = workoutType === "reformer" ? ["實體"] : ["線上"];
            }

            const todayStr = new Date().toISOString().split("T")[0];
            const isCompleted = workoutType === "video" ? true : (selectedDate <= todayStr);

            await onAddLog({
              date: selectedDate,
              videoUrl: finalUrl,
              videoTitle: trimTitle || (workoutType === "reformer" ? "未命名實體課" : "未命名排課"),
              videoThumbnail: parsedMeta.thumbnail,
              tags: finalTags,
              duration: duration || 15,
              isCompleted: isCompleted,
            });

            setVideoUrl("");
            setParsedMeta(null);
            setDuration(15);
            setShowAddForm(false);
            setLoggingProgress(false);
          }, 200);
        };

        // 將完成的打卡日期彙整為 Set，供日曆及統計使用
        const checkedDates = useMemo(() => {
          const dates = new Set();
          logs.forEach((log) => {
            if (log.isCompleted !== false) dates.add(log.date);
          });
          return dates;
        }, [logs]);

        // 計算打卡統計數據（連擊、本月打卡、總計打卡）
        const stats = useMemo(() => {
          let currentStreak = 0;
          const todayStr = new Date().toISOString().split("T")[0];
          const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split("T")[0];

          if (checkedDates.has(todayStr) || checkedDates.has(yesterdayStr)) {
            let tempDate = checkedDates.has(todayStr) ? new Date(todayStr) : new Date(yesterdayStr);
            while (true) {
              const formattedDate = tempDate.toISOString().split("T")[0];
              if (checkedDates.has(formattedDate)) {
                currentStreak++;
                tempDate.setDate(tempDate.getDate() - 1);
              } else {
                break;
              }
            }
          }

          const realToday = new Date();
          const realYear = realToday.getFullYear();
          const realMonth = realToday.getMonth() + 1;
          const monthPrefix = `${realYear}-${realMonth < 10 ? "0" + realMonth : realMonth}`;
          
          const thisMonthWorkouts = new Set(
            logs.filter((log) => log.date.startsWith(monthPrefix) && log.isCompleted !== false).map(log => log.date)
          ).size;

          return {
            currentStreak,
            thisMonthWorkouts,
            allTimeDays: checkedDates.size,
          };
        }, [checkedDates, logs]);

        // 過濾出目前選取日期的打卡資料
        const selectedDateLogs = useMemo(() => {
          return logs.filter((log) => log.date === selectedDate);
        }, [logs, selectedDate]);

        // 計算日曆面板需要渲染的日期格子
        const calendarDays = useMemo(() => {
          const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
          const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
          const prevMonthTotalDays = new Date(currentYear, currentMonth, 0).getDate();

          const daysList = [];
          for (let i = firstDayIndex - 1; i >= 0; i--) {
            const day = prevMonthTotalDays - i;
            const m = currentMonth === 0 ? 12 : currentMonth;
            const y = currentMonth === 0 ? currentYear - 1 : currentYear;
            daysList.push({
              day,
              dateString: `${y}-${m < 10 ? '0' + m : m}-${day < 10 ? '0' + day : day}`,
              isCurrentMonth: false,
            });
          }

          for (let i = 1; i <= totalDays; i++) {
            const m = currentMonth + 1;
            daysList.push({
              day: i,
              dateString: `${currentYear}-${m < 10 ? '0' + m : m}-${i < 10 ? '0' + i : i}`,
              isCurrentMonth: true,
            });
          }

          const remainingSlots = 42 - daysList.length;
          for (let i = 1; i <= remainingSlots; i++) {
            const m = currentMonth === 11 ? 1 : currentMonth + 2;
            const y = currentMonth === 11 ? currentYear + 1 : currentYear;
            daysList.push({
              day: i,
              dateString: `${y}-${m < 10 ? '0' + m : m}-${i < 10 ? '0' + i : i}`,
              isCurrentMonth: false,
            });
          }

          return daysList;
        }, [currentYear, currentMonth]);

        const todayStr = new Date().toISOString().split("T")[0];

        return (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            {/* 左側日曆區塊 */}
            <div className="lg:col-span-7 space-y-6">
              <div className="bg-white/50 backdrop-blur-xl border border-white/80 rounded-3xl shadow-xs p-6">
                
                {/* 統計資料顯示 */}
                <div className="flex justify-between items-center mb-6 px-2">
                  <div className="flex flex-col items-center flex-1">
                    <span className="text-[11px] text-slate-400 font-bold mb-1">連續打卡</span>
                    <div className="flex items-baseline gap-0.5">
                      <span className="text-xl font-bold text-blue-600">{stats.currentStreak}</span>
                      <span className="text-xs text-slate-500 font-medium">天</span>
                    </div>
                  </div>
                  <div className="w-px h-10 bg-slate-200/60"></div>
                  <div className="flex flex-col items-center flex-1">
                    <span className="text-[11px] text-slate-400 font-bold mb-1">本月打卡</span>
                    <div className="flex items-baseline gap-0.5">
                      <span className="text-xl font-bold text-slate-700">{stats.thisMonthWorkouts}</span>
                      <span className="text-xs text-slate-500 font-medium">天</span>
                    </div>
                  </div>
                  <div className="w-px h-10 bg-slate-200/60"></div>
                  <div className="flex flex-col items-center flex-1">
                    <span className="text-[11px] text-slate-400 font-bold mb-1">累計打卡</span>
                    <div className="flex items-baseline gap-0.5">
                      <span className="text-xl font-bold text-slate-700">{stats.allTimeDays}</span>
                      <span className="text-[10px] text-slate-500 font-medium">天</span>
                    </div>
                  </div>
                </div>

                <div className="h-px w-full bg-gradient-to-r from-transparent via-slate-200 to-transparent mb-4"></div>

                {/* 選擇月份控制器 */}
                <div className="flex justify-between items-center mb-6 px-1">
                  <button 
                    className="text-lg font-bold text-slate-900 cursor-pointer hover: transition flex items-center gap-1.5 group focus:outline-none"
                    onClick={() => {
                      const today = new Date();
                      setCurrentYear(today.getFullYear());
                      setCurrentMonth(today.getMonth());
                      const yyyy = today.getFullYear();
                      const mm = String(today.getMonth() + 1).padStart(2, "0");
                      const dd = String(today.getDate()).padStart(2, "0");
                      onSelectDate(`${yyyy}-${mm}-${dd}`);
                    }}
                    title="點擊回到當天日期"
                  >
                    <span>{currentYear} 年 {currentMonth + 1} 月</span>
                  </button>
                  
                  <div className="flex items-center gap-1">
                    <button
                      onClick={() => {
                        if (currentMonth === 0) {
                          setCurrentMonth(11);
                          setCurrentYear(y => y - 1);
                        } else {
                          setCurrentMonth(m => m - 1);
                        }
                      }}
                      className="p-2 border border-white/60 bg-white/40 rounded-xl hover:bg-white/70 text-slate-600 transition"
                    >
                      <SVGIcon name="ChevronLeft" className="w-4 h-4" />
                    </button>
                    <button
                      onClick={() => {
                        if (currentMonth === 11) {
                          setCurrentMonth(0);
                          setCurrentYear(y => y + 1);
                        } else {
                          setCurrentMonth(m => m + 1);
                        }
                      }}
                      className="p-2 border border-white/60 bg-white/40 rounded-xl hover:bg-white/70 text-slate-600 transition"
                    >
                      <SVGIcon name="ChevronRight" className="w-4 h-4" />
                    </button>
                  </div>
                </div>

                <div className="grid grid-cols-7 gap-1 text-center mb-3">
                  {["日", "一", "二", "三", "四", "五", "六"].map((w, idx) => (
                    <span
                      key={w}
                      className={`text-[11px] font-bold py-1 ${
                        idx === 0 || idx === 6 ? "text-rose-400/80" : "text-slate-500"
                      }`}
                    >
                      {w}
                    </span>
                  ))}
                </div>

                {/* 顯示日曆日期格子 */}
                <div className="grid grid-cols-7 gap-y-1.5 gap-x-1">
                  {calendarDays.map((item, idx) => {
                    const hasCompletedCourse = checkedDates.has(item.dateString);
                    const hasPlannedCourse = logs.some(l => l.date === item.dateString && l.isCompleted === false);
                    const isSelected = selectedDate === item.dateString;
                    const isToday = new Date().toISOString().split("T")[0] === item.dateString;
                    const isMenstrualDay = menstrualDates.includes(item.dateString);

                    let btnClass = "relative w-9 h-9 sm:w-10 sm:h-10 mx-auto rounded-full flex items-center justify-center transition cursor-pointer text-[13px] font-bold border ";

                    if (isMenstrualEditMode) {
                      if (isMenstrualDay) {
                        btnClass += "bg-rose-400 text-white border-rose-500 shadow-md ring-2 ring-rose-200 ring-offset-1";
                      } else {
                        btnClass += "bg-white text-slate-400 border-slate-200 hover:bg-rose-50 hover:text-rose-400";
                      }
                    } else {
                      if (isSelected) {
                        if (hasCompletedCourse) {
                          btnClass += "bg-blue-500 text-white border-blue-500 shadow-md";
                        } else if (hasPlannedCourse) {
                          btnClass += "bg-slate-200 text-slate-700 border-slate-200 shadow-md"; 
                        } else if (isMenstrualDay) {
                          btnClass += "bg-rose-400 text-white border-rose-400 shadow-md";
                        } else {
                          btnClass += "bg-white text-slate-700 border-slate-400 shadow-sm";
                        }
                      } else {
                        if (hasCompletedCourse) {
                          btnClass += "bg-blue-100 text-blue-500 border-transparent shadow-sm hover:bg-blue-200";
                        } else if (hasPlannedCourse) {
                          btnClass += "bg-slate-100 text-slate-700 border-transparent shadow-sm hover:bg-slate-200"; 
                        } else if (isMenstrualDay) {
                          btnClass += "bg-rose-100 text-rose-500 border-transparent hover:bg-rose-200";
                        } else if (isToday) {
                          btnClass += "bg-blue-50/80 text-blue-700 border-blue-200/50 hover:bg-blue-100";
                        } else if (item.isCurrentMonth) {
                          btnClass += "text-slate-700 border-transparent hover:bg-white/80";
                        } else {
                          btnClass += "text-slate-300 border-transparent hover:bg-white/40";
                        }
                      }
                    }

                    return (
                      <button
                        key={idx}
                        onClick={() => {
                          if (isMenstrualEditMode) {
                            onToggleMenstrualDate(item.dateString);
                          } else {
                            onSelectDate(item.dateString);
                          }
                        }}
                        className={btnClass}
                      >
                        {item.day}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 右側清單與表單區塊 */}
            <div className="lg:col-span-5 space-y-6">
              
              {/* 新增紀錄表單區 */}
              {showAddForm && (
                <div className="bg-white/55 backdrop-blur-md border border-white/80 rounded-3xl p-5 space-y-4 shadow-xs animate-fade-in">
                  <div className="flex justify-between items-center border-b border-slate-100 pb-2.5">
                    <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <SVGIcon name="BookmarkCheck" className="w-4 h-4 text-blue-500" />
                      <span>新增訓練打卡</span>
                    </span>
                    <button
                      onClick={() => {
                        setShowAddForm(false);
                        setParsedMeta(null);
                        setVideoUrl("");
                      }}
                      className="text-slate-400 hover:text-slate-600 p-1"
                    >
                      ✕
                    </button>
                  </div>

                  <div className="space-y-1.5">
                    <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">訓練方式</label>
                    <div className="bg-white/40 border border-white/80 p-0.5 rounded-xl flex">
                      <button
                        type="button"
                        onClick={() => setWorkoutType("video")}
                        className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                          workoutType === "video" ? "bg-white text-blue-600 shadow-xs" : "text-slate-500 hover:text-slate-800"
                        }`}
                      >
                        <SVGIcon name="Video" className="w-3.5 h-3.5" />
                        <span>線上影片</span>
                      </button>
                      <button
                        type="button"
                        onClick={() => setWorkoutType("reformer")}
                        className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all flex items-center justify-center gap-1.5 ${
                          workoutType === "reformer" ? "bg-white text-blue-600 shadow-xs" : "text-slate-500 hover:text-slate-800"
                        }`}
                      >
                        <SVGIcon name="Sparkles" className="w-3.5 h-3.5 text-blue-600" />
                        <span>實體課程</span>
                      </button>
                    </div>
                  </div>

                  {workoutType === "video" ? (
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">影片網址</label>
                      <div className="flex gap-2">
                        <div className="relative flex-1">
                          <input
                            type="text"
                            value={videoUrl}
                            onChange={(e) => setVideoUrl(e.target.value)}
                            placeholder="Youtube 或 Vimeo 網址..."
                            className="w-full pl-3 pr-8 py-2 bg-white/50 border border-white/80 rounded-xl text-xs text-slate-800 focus:outline-none focus:ring-1.5 focus:ring-blue-400/.5"
                          />
                          {videoUrl && (
                            <button onClick={() => setVideoUrl("")} className="absolute right-2.5 top-2.5 text-slate-400 hover:text-slate-600 text-xs">✕</button>
                          )}
                        </div>
                        <button
                          type="button"
                          disabled={isFetchingInfo || !videoUrl.trim()}
                          onClick={handleFetchMetadata}
                          className="px-3.5 bg-slate-900 border border-slate-950 rounded-xl text-white text-xs font-bold hover:bg-slate-850 disabled:opacity-40"
                        >
                          自動分析
                        </button>
                      </div>
                      {fetchError && (
                        <p className="text-[10px] text-rose-600 bg-rose-50 border border-rose-100 p-2.5 rounded-lg animate-pulse">{fetchError}</p>
                      )}
                    </div>
                  ) : (
                    <div className="space-y-1">
                      <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">課程選單</label>
                      <select
                        value={reformerPreset}
                        onChange={(e) => setReformerPreset(e.target.value)}
                        className="w-full px-3 py-2 bg-white/50 border border-white/80 rounded-xl text-xs text-slate-800 focus:outline-none"
                      >
                        {physicalCourses.map((course) => (
                          <option key={course.url} value={course.url}>
                            {course.title}
                          </option>
                        ))}
                        <option value="custom">自訂</option>
                      </select>
                    </div>
                  )}

                  {parsedMeta && (
                    <div className="space-y-4 pt-2.5 border-t border-slate-100 animate-fade-in">
                      <div className="flex gap-3 bg-white/75 p-2 border border-white/95 rounded-2xl">
                        <div className="relative w-28 h-20 overflow-hidden rounded-xl border border-white/85 shrink-0 bg-white">
                          <img
                            src={getCleanThumbnail(parsedMeta.thumbnail)}
                            alt="Preview Thumbnail"
                            className="w-full h-full object-cover"
                          />
                        </div>
                        <div className="space-y-1 overflow-hidden flex-1">
                          <span className="text-[9px] font-bold bg-blue-50 text-blue-700 px-1.5 py-0.5 rounded uppercase font-sans">
                            {workoutType === "reformer" ? "實體" : "線上"}
                          </span>
                          <p className="text-xs text-slate-800 font-bold truncate leading-tight">
                            {customTitle || "請輸入課程名稱"}
                          </p>
                          <p className="text-[10px] text-slate-400 truncate">{videoUrl}</p>
                        </div>
                      </div>

                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">課程名稱</label>
                        <input
                          type="text"
                          value={customTitle}
                          onChange={(e) => setCustomTitle(e.target.value)}
                          disabled={workoutType === "reformer" && reformerPreset !== "custom"}
                          placeholder="請輸入課程名稱..."
                          className="w-full px-3 py-2 border border-slate-200 bg-white/50 rounded-xl text-xs"
                        />
                      </div>

                      <div className="space-y-1">
                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider block">訓練時長</label>
                        <div className="relative">
                          <input
                            type="number"
                            min={1}
                            max={180}
                            value={duration}
                            onChange={(e) => setDuration(Math.max(1, Number(e.target.value)))}
                            disabled={workoutType === "reformer" && reformerPreset !== "custom"}
                            className="w-full pl-3 pr-8 py-2 border border-slate-200 bg-white/50 rounded-xl text-xs font-sans"
                          />
                          <span className="absolute right-3 top-2.5 text-[10px] text-slate-400 font-bold font-sans">分鐘</span>
                        </div>
                      </div>

                      <button
                        type="button"
                        disabled={loggingProgress}
                        onClick={handleCreateCheckIn}
                        className="w-full py-2.5 bg-slate-950 text-white text-xs font-bold rounded-xl shadow-lg transition hover:bg-slate-850 flex justify-center items-center gap-1.5"
                      >
                        {loggingProgress ? (
                          <div className="w-3.5 h-3.5 border-2 border-blue-400 border-t-transparent animate-spin rounded-full"></div>
                        ) : (
                          <>
                            <SVGIcon name="CheckCircle2" className="w-3.5 h-3.5 text-white" />
                            <span>儲存打卡</span>
                          </>
                        )}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* 顯示選擇日期的所有打卡清單 */}
              <div className="space-y-3">
                <div className="flex justify-between items-center">
                  <h4 className="ml-2 text-sm font-bold text-slate-800 font-sans flex items-center gap-1.5">
                    <span>{parseInt(selectedDate.split("-")[0])}年{parseInt(selectedDate.split("-")[1])}月{parseInt(selectedDate.split("-")[2])}日</span>
                    <span className="text-xs text-slate-400 font-normal">（{selectedDateLogs.length} 筆）</span>
                  </h4>

                  <div className="flex items-center gap-2">
                    {isMenstrualEditMode ? (
                      <button
                        onClick={() => setIsMenstrualEditMode(false)}
                        className="p-1.5 bg-rose-500 text-white rounded-xl shadow-xs transition"
                        title="完成設定"
                      >
                        <SVGIcon name="Check" className="w-4 h-4" />
                      </button>
                    ) : (
                      <button
                        onClick={() => setIsMenstrualEditMode(true)}
                        className="px-2 py-1.5 bg-rose-100 text-rose-500 hover:bg-rose-200 rounded-xl shadow-xs transition"
                        title="設定經期"
                      >
                        <SVGIcon name="Droplet" className="w-4 h-4" />
                      </button>
                    )}
                    <button
                      onClick={() => setShowAddForm(!showAddForm)}
                      className="flex items-center gap-1 px-3 py-1.5 bg-slate-950 text-white text-xs font-bold rounded-xl shadow-xs hover:bg-slate-800"
                    >
                      <SVGIcon name="Plus" className="w-3.5 h-3.5" />
                      <span>新增</span>
                    </button>
                  </div>
                </div>

                {selectedDateLogs.length === 0 ? (
                  <div className="bg-white/30 backdrop-blur-xs border border-white/60 border-dashed rounded-3xl p-8 text-center text-slate-400 space-y-2">
                    <div className="flex justify-center">
                      <SVGIcon name="Video" className="w-8 h-8 text-slate-350" />
                    </div>
                    <p className="text-xs font-bold text-slate-500">無打卡紀錄</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {selectedDateLogs.map((log) => {
                      const isPhysical = log.videoUrl.includes("reformer") || (log.tags || []).includes("實體");
                      return (
                        <div
                          key={log.id}
                          className="bg-white/60 hover:bg-white/70 border border-white/80 rounded-2xl overflow-hidden shadow-2xs hover:shadow-xs transition duration-200 group relative"
                        >
                          <div className="flex items-stretch h-[84px] shrink-0">
                            <div className={`relative w-32 shrink-0 bg-slate-50 overflow-hidden`}>
                              <img
                                src={getCleanThumbnail(log.videoThumbnail)}
                                alt="Log Preview"
                                className="absolute inset-0 w-full h-full object-cover"
                              />
                              {log.videoUrl.includes("reformer") ? null : (
                                <a
                                  href={log.videoUrl}
                                  target="_blank"
                                  rel="noreferrer"
                                  className="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-white text-[10px] font-bold"
                                >
                                  <SVGIcon name="ExternalLink" className="w-3.5 h-3.5 mr-0.5" />
                                  播放
                                </a>
                              )}
                            </div>

                            <div className="px-3 pt-2.5 pb-1.5 select-none flex-1 min-w-0 flex flex-col justify-between">
                              <div className="flex justify-between items-start gap-1">
                                <h5 className="text-[12px] font-bold text-slate-800 leading-tight truncate pt-0.5">
                                  {log.videoTitle}
                                </h5>
                                {isPhysical && (
                                  <button
                                    onClick={() => onUpdateLog(log.id, { isCompleted: log.isCompleted === false ? true : false })}
                                    className={`shrink-0 p-1 rounded border transition-colors ${
                                      log.isCompleted === false
                                        ? 'bg-white border-slate-200 text-slate-300 hover:text-blue-500 hover:border-blue-300'
                                        : 'bg-blue-50 border-blue-200 text-blue-600 hover:bg-white hover:text-slate-400 hover:border-slate-200'
                                    }`}
                                    title={log.isCompleted === false ? '標記為已上' : '標記為預定'}
                                  >
                                    <SVGIcon name="Check" className="w-3.5 h-3.5" />
                                  </button>
                                )}
                              </div>

                              <div className="flex items-center gap-1.5 text-[10px] text-slate-550 font-medium my-auto">
                                <SVGIcon name="Clock" className="w-3.5 h-3.5 text-slate-400 shrink-0" />
                                <span>約 {log.duration || 15} 分鐘</span>
                                {log.isCompleted === false && (
                                  <span className="text-slate-500 ml-1 px-1.5 py-0.5 bg-slate-100 rounded-md whitespace-nowrap">
                                    預定
                                  </span>
                                )}
                              </div>

                              <div className="flex justify-between items-center gap-1.5">
                                <div className="flex flex-wrap gap-0.5 max-h-4.5 overflow-hidden">
                                  {log.tags && log.tags.length > 0 ? (
                                    log.tags.map((tag) => (
                                      <span
                                        key={tag}
                                        className="px-1.5 py-0.5 text-[8px] font-bold bg-blue-50/70 border border-blue-100/30 text-blue-700 rounded"
                                      >
                                        {tag}
                                      </span>
                                    ))
                                  ) : (
                                    <span className="text-[8px] text-slate-400 italic">無</span>
                                  )}
                                </div>

                                <div className="flex items-center gap-1 shrink-0">
                                  <button
                                    onClick={() => {
                                      setLogToEditDuration(log);
                                      setEditingDuration(log.duration || 15);
                                    }}
                                    className="text-slate-400 hover:text-blue-600 p-1"
                                    title="修改時長"
                                  >
                                    <SVGIcon name="FileEdit" className="w-3.5 h-3.5" />
                                  </button>
                                  <button
                                    onClick={() => setLogToDelete(log)}
                                    className="text-slate-400 hover:text-rose-600 p-1"
                                    title="刪除"
                                  >
                                    <SVGIcon name="Trash2" className="w-3.5 h-3.5" />
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>

                          {log.notes && (
                            <div className="bg-white/40 px-3 py-1.5 text-[10px] text-slate-600 leading-relaxed flex items-start gap-1.5 border-t border-white/80">
                              <SVGIcon name="FileText" className="w-3" />
                              <span>{log.notes}</span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

            {/* 刪除確認視窗 Modal */}
            {logToDelete && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex items-center gap-3 text-rose-600">
                    <div className="p-2.5 bg-rose-50 rounded-2xl">
                      <SVGIcon name="Trash2" className="w-5 h-5" />
                    </div>
                    <h4 className="text-sm font-bold text-slate-800">確認刪除此訓練打卡記錄？</h4>
                  </div>
                  <div className="flex gap-2.5 pt-1.5">
                    <button
                      onClick={() => setLogToDelete(null)}
                      className="flex-1 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl"
                    >
                      取消
                    </button>
                    <button
                      onClick={async () => {
                        await onDeleteLog(logToDelete.id);
                        setLogToDelete(null);
                      }}
                      className="flex-1 py-2 bg-rose-600 text-white text-xs font-bold rounded-xl shadow-md cursor-pointer"
                    >
                      確認刪除
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}

            {/* 修改時長視窗 Modal */}
            {logToEditDuration && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex items-center gap-3 text-blue-600">
                    <div className="p-2.5 bg-blue-50 rounded-2xl">
                      <SVGIcon name="FileEdit" className="w-5 h-5 text-blue-600" />
                    </div>
                    <h4 className="text-sm font-bold text-slate-800">修改訓練時長</h4>
                  </div>
                  <div className="space-y-2">
                    <p className="text-[11px] text-slate-500">請更新「{logToEditDuration.videoTitle}」的本次訓練時長：</p>
                    <div className="flex items-center gap-2">
                      <input
                        type="number"
                        min={1}
                        max={180}
                        value={editingDuration}
                        onChange={(e) => setEditingDuration(Math.max(1, Number(e.target.value)))}
                        className="flex-grow px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-sans"
                      />
                      <span className="text-xs text-slate-500 font-bold">分鐘</span>
                    </div>
                  </div>
                  <div className="flex gap-2.5 pt-1">
                    <button
                      onClick={() => setLogToEditDuration(null)}
                      className="flex-1 py-2 bg-slate-100 text-slate-600 text-xs font-bold rounded-xl"
                    >
                      取消
                    </button>
                    <button
                      onClick={async () => {
                        await onUpdateLog(logToEditDuration.id, { duration: editingDuration });
                        setLogToEditDuration(null);
                      }}
                      className="flex-1 py-2 bg-blue-600 text-white text-xs font-bold rounded-xl shadow-md cursor-pointer"
                    >
                      確認修改
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}
          </div>
        );
      }

      /**
       * 歷史訓練清單 / 課程庫元件
       */
      function VideoRecordsPage({ logs, onQuickCheckIn, onUpdateLog }) {
        const [searchQuery, setSearchQuery] = useState("");
        const [selectedTag, setSelectedTag] = useState("釘選");
        const [sortBy, setSortBy] = useState("latest");

        const [quickLogVideo, setQuickLogVideo] = useState(null);
        const [quickDuration, setQuickDuration] = useState(15);
        const [isSubmitting, setIsSubmitting] = useState(false);
	      const [quickDate, setQuickDate] = useState(() => new Date().toISOString().split("T")[0]);

        const [editingTagsVideo, setEditingTagsVideo] = useState(null);
        const [editingVideoTitle, setEditingVideoTitle] = useState("");
        const [tagFormSelected, setTagFormSelected] = useState([]);
        const [editingVideoThumbnail, setEditingVideoThumbnail] = useState("");
        const [isSavingTags, setIsSavingTags] = useState(false);

        // 管理釘選課程
        const [pinnedUrls, setPinnedUrls] = useState(() => {
          try {
            return JSON.parse(localStorage.getItem(PIN_STORAGE_KEY) || "[]");
          } catch {
            return [];
          }
        });

        const togglePin = (url) => {
          const next = pinnedUrls.includes(url) ? pinnedUrls.filter(u => u !== url) : [...pinnedUrls, url];
          setPinnedUrls(next);
          localStorage.setItem(PIN_STORAGE_KEY, JSON.stringify(next));
        };

        // 彙整所有訓練影片與次數
        const uniqueVideos = useMemo(() => {
          const map = new Map();
          logs.forEach((log) => {
            const isCompleted = log.isCompleted !== false;
            const existing = map.get(log.videoUrl);

            if (existing) {
              if (isCompleted) {
                existing.practiceCount += 1;
                if (!existing.latestPracticeDate || log.date > existing.latestPracticeDate) {
                  existing.latestPracticeDate = log.date;
                  existing.latestDuration = log.duration || 15;
                }
              }
              if (log.createdAt > existing.latestTimestamp) {
                existing.latestTimestamp = log.createdAt;
                existing.videoTitle = log.videoTitle;
                existing.videoThumbnail = log.videoThumbnail;
                existing.tags = Array.from(new Set([...existing.tags, ...(log.tags || [])]));
                if (isCompleted) {
                  existing.latestDuration = log.duration || existing.latestDuration || 15;
                }
              }
            } else {
              map.set(log.videoUrl, {
                videoUrl: log.videoUrl,
                videoTitle: log.videoTitle,
                videoThumbnail: log.videoThumbnail,
                tags: [...(log.tags || [])],
                practiceCount: isCompleted ? 1 : 0,
                latestPracticeDate: isCompleted ? log.date : "",
                latestTimestamp: log.createdAt,
                latestDuration: log.duration || 15,
              });
            }
          });
          return Array.from(map.values());
        }, [logs]);

        // 搜尋及過濾演算法
        const filteredVideos = useMemo(() => {
          const list = uniqueVideos.filter((v) => {
            const matchesSearch = v.videoTitle.toLowerCase().includes(searchQuery.toLowerCase());
            let matchesTag = false;

            if (selectedTag === "釘選") {
              matchesTag = pinnedUrls.includes(v.videoUrl);
            } else if (selectedTag === "全部") {
              matchesTag = true;
            } else if (selectedTag === "線上") {
              matchesTag = !v.videoUrl.includes("reformer") && !v.tags.includes("實體");
            } else if (selectedTag === "實體") {
              matchesTag = v.videoUrl.includes("reformer") || v.tags.includes("實體");
            } else {
              const normalizedTags = v.tags.map(t => t.toLowerCase());
              matchesTag = normalizedTags.some(t => t.includes(selectedTag.toLowerCase()));
            }

            return matchesSearch && matchesTag;
          });

          if (sortBy === "latest") {
            list.sort((a, b) => (b.latestPracticeDate || "").localeCompare(a.latestPracticeDate || ""));
          } else {
            list.sort((a, b) => b.practiceCount - a.practiceCount);
          }

          const pinned = list.filter(v => pinnedUrls.includes(v.videoUrl));
          const unpinned = list.filter(v => !pinnedUrls.includes(v.videoUrl));
          return [...pinned, ...unpinned];
        }, [uniqueVideos, searchQuery, selectedTag, sortBy, pinnedUrls]);

        // 快速打卡上課功能
        const handleQuickLogSubmit = async () => {
          if (!quickLogVideo) return;
          
          setIsSubmitting(true);
          
          try {
            const targetDate = quickDate || new Date().toISOString().split("T")[0];
            const todayStr = new Date().toISOString().split("T")[0];
            const isQuickFuture = targetDate > todayStr;
            const isQuickPhysical = quickLogVideo.videoUrl.includes("reformer") || (quickLogVideo.tags || []).includes("實體");
            
            await onQuickCheckIn({
              date: targetDate,
              videoUrl: quickLogVideo.videoUrl,
              videoTitle: quickLogVideo.videoTitle,
              videoThumbnail: quickLogVideo.videoThumbnail,
              tags: quickLogVideo.tags || [],
              duration: Number(quickDuration) || 15,
              isCompleted: isQuickPhysical ? !isQuickFuture : true,
            });
            
            setQuickLogVideo(null);
            setQuickDuration(15);
            setQuickDate(new Date().toISOString().split("T")[0]);
            
          } catch (error) {
            console.error("快速打卡儲存失敗:", error);
            alert("儲存失敗，請打開瀏覽器主控台檢查錯誤原因。");
          } finally {
            setIsSubmitting(false);
          }
        };

        // 儲存修改課程標籤資訊
        const handleSaveTags = () => {
          if (!editingTagsVideo) return;
          setIsSavingTags(true);

          setTimeout(async () => {
            const logsToUpdate = logs.filter(log => log.videoUrl === editingTagsVideo.videoUrl);
            for (const log of logsToUpdate) {
              await onUpdateLog(log.id, {
                videoTitle: editingVideoTitle.trim() || log.videoTitle,
                tags: tagFormSelected,
                videoThumbnail: editingVideoThumbnail.trim() || log.videoThumbnail
              });
            }
            setIsSavingTags(false);
            setEditingTagsVideo(null);
          }, 200);
        };

        const handleOpenEditTags = (video) => {
          setEditingTagsVideo(video);
          setEditingVideoTitle(video.videoTitle);
          setTagFormSelected([...(video.tags || [])]);
          setEditingVideoThumbnail(video.videoThumbnail || "");
        };

        const handleToggleTagInForm = (tag) => {
          if (tagFormSelected.includes(tag)) {
            setTagFormSelected(tagFormSelected.filter(t => t !== tag));
          } else {
            setTagFormSelected([...tagFormSelected, tag]);
          }
        };

        return (
          <div className="space-y-6">
            {/* 搜尋與篩選控制器 */}
            <div className="bg-white/50 backdrop-blur-xl border border-white/80 p-5 rounded-3xl shadow-2xs space-y-4">
              <div className="grid grid-cols-1 md:grid-cols-12 gap-3.5">
                
                <div className="md:col-span-6 relative">
                  <span className="absolute left-3 top-2.5 text-slate-400">
                    <SVGIcon name="Search" className="w-3.5 h-3.5" />
                  </span>
                  <input
                    type="text"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="輸入關鍵字"
		    className="w-full pl-8 pr-3 py-2 bg-white border border-slate-200 rounded-xl text-xs focus:ring-1.5 focus:ring-blue-400/50 focus:outline-none"
                  />
                </div>

                <div className="md:col-span-6 flex gap-2">
                  <div className="relative flex-1">
                    <span className="absolute left-3 top-2.5 text-slate-400">
                      <SVGIcon name="ArrowUpDown" className="w-3.5 h-3.5" />
                    </span>
                    <select
                      value={sortBy}
                      onChange={(e) => setSortBy(e.target.value)}
                      className="w-full pl-8 pr-3 py-2 bg-white border border-slate-200 rounded-xl text-xs focus:ring-1.5 focus:ring-blue-400/50 focus:outline-none0"
                    >
                      <option value="latest">依日期排序</option>
                      <option value="count">依頻率排序</option>
                    </select>
                  </div>
                </div>
              </div>

              <div className="space-y-2 border-t border-slate-100/60 pt-3">
                <div className="flex flex-wrap gap-1">
                  {["釘選","全部", "線上", "實體"].map((tag) => {
                    const isSelected = selectedTag === tag;
                    return (
                      <button
                        key={tag}
                        onClick={() => setSelectedTag(tag)}
                        className={`px-3 py-1.5 text-xs font-bold rounded-xl transition border ${
                          isSelected
                            ? "bg-blue-600 text-white border-blue-600 shadow-xs"
                            : "bg-white/60 text-slate-500 border-slate-200/55 hover:bg-white"
                        }`}
                      >
                        {tag}
                      </button>
                    );
                  })}
                </div>
                
                <div className="flex flex-wrap gap-1">
                  {["肩頸", "背部", "核心", "臀部", "腿部", "伸展"].map((tag) => {
                    const isSelected = selectedTag === tag;
                    return (
                      <button
                        key={tag}
                        onClick={() => setSelectedTag(tag)}
                        className={`px-3 py-1.5 text-xs font-bold rounded-xl transition border ${
                          isSelected
                            ? "bg-blue-600 text-white border-blue-600 shadow-xs"
                            : "bg-white/60 text-slate-500 border-slate-200/55 hover:bg-white"
                        }`}
                      >
                        {tag}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* 影片卡片列表區塊 */}
            {filteredVideos.length === 0 ? (
              <div className="bg-white/40 border border-white/80 border-dashed rounded-[2rem] p-12 text-center text-slate-400 max-w-sm mx-auto space-y-3">
                <div className="flex justify-center">
                  <SVGIcon name="Video" className="w-10 h-10 text-slate-350" />
                </div>
                <h5 className="font-bold text-slate-600">無符合課程</h5>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {filteredVideos.map((video) => {
                  const isPinned = pinnedUrls.includes(video.videoUrl);
                  return (
                    <div
                      key={video.videoUrl}
                      className="bg-white/55 backdrop-blur-md border border-white/80 rounded-3xl overflow-hidden shadow-xs hover:shadow-lg transition-all duration-300 hover:scale-[1.01] flex flex-col group font-sans relative"
                    >
                      <div className="relative aspect-video w-full bg-slate shadow-inner shrink-0 overflow-hidden">
                        <img
                          src={getCleanThumbnail(video.videoThumbnail)}
                          alt={video.videoTitle}
                          className={`block w-full h-full object-cover transition-transform duration-300 ${
                            (video.videoThumbnail?.includes("ytimg") || video.videoThumbnail?.includes("youtube")) 
                              ? "scale-[1.0] group-hover:scale-[1.02]" 
                              : "group-hover:scale-[1.02]"
                          }`}
                        />
                        
                        <button
                          onClick={() => togglePin(video.videoUrl)}
                          className={`absolute top-3 right-3 p-2 rounded-full backdrop-blur-md text-white transition-all duration-200 z-10 cursor-pointer shadow-sm ${
                            isPinned 
                              ? "bg-amber-400 border border-amber-400 font-bold" 
                              : "bg-slate-900/60 hover:bg-slate-900/80 border border-white/20"
                          }`}
                          title={isPinned ? "取消釘選" : "釘選影片"}
                        >
                          <SVGIcon name="Pin" className={`w-3.5 h-3.5 ${isPinned ? "rotate-45 fill-white" : ""}`} />
                        </button>

                        <div className="absolute top-3 left-3 flex flex-col gap-1.5 z-10">
                          <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[10px] font-extrabold uppercase tracking-widest bg-blue-600/95 border border-blue-500 text-white leading-none shadow-md font-sans">
                            {video.videoUrl.includes("reformer") ? (
                              <>
                                <SVGIcon name="TrendingUp" className="w-3.5 h-3.5" />
                                <span>上課 {video.practiceCount} 堂</span>
                              </>
                            ) : (
                              <>
                                <SVGIcon name="TrendingUp" className="w-3.5 h-3.5" />
                                <span>練習 {video.practiceCount} 次</span>
                              </>
                            )}
                          </span>
                        </div>

                        {video.videoUrl.includes("reformer") ? null : (
                          <div className="absolute inset-0 bg-slate-950/35 opacity-0 group-hover:opacity-100 transition-opacity duration-200 flex items-center justify-center">
                            <a
                              href={video.videoUrl}
                              target="_blank"
                              rel="noreferrer"
                              className="p-3 bg-white text-slate-905 rounded-full hover:scale-110 duration-200 shadow-md flex items-center justify-center"
                            >
                              <SVGIcon name="Play" className="w-4 h-4 fill-slate-905 ml-0.5" />
                            </a>
                          </div>
                        )}
                      </div>

                      <div className="p-4 flex-1 flex flex-col justify-between space-y-3.5">
                        <div className="space-y-1.5">
                          <h4 className="text-[12px] sm:text-[13px] font-bold text-slate-850 leading-snug tracking-wide group-hover:text-blue-900 transition-colors line-clamp-2">
                            {video.videoTitle}
                          </h4>
                          
                          <div className="flex items-center gap-1 text-[10px] text-slate-400 font-medium">
                            <SVGIcon name="Calendar" className="w-3.5 h-3.5 text-slate-400" />
                            <span>上次上課日期：{video.latestPracticeDate || "無"}</span>
                          </div>
                        </div>

                        <div className="pt-3 border-t border-slate-100/60 flex items-center justify-between gap-2">
                          <div className="flex items-center gap-1.5 flex-1 min-w-0 overflow-hidden whitespace-nowrap">
                            {video.tags && video.tags.length > 0 ? (
                              <>
                                {(video.tags.length > 4 ? video.tags.slice(0, 3) : video.tags).map((t) => (
                                  <span
                                    key={t}
                                    className="px-2 py-1 rounded-md text-[10px] font-bold text-blue-700 bg-blue-50/90 border border-blue-200/60 shrink-0 text-center min-w-[37px]"
                                  >
                                    {t}
                                  </span>
                                ))}
                                {video.tags.length > 4 && (
                                  <span className="px-2 py-1 rounded-md text-[10px] font-bold text-slate-500 bg-slate-100 border border-slate-200/80 shrink-0  text-center min-w-[37px]">
                                    +{video.tags.length - 3}
                                  </span>
                                )}
                              </>
                            ) : (
                              <span className="text-[10px] text-slate-400 italic shrink-0">無分類</span>
                            )}
                          </div>

                          <div className="flex items-center gap-1.5 shrink-0">
                            <button
                              title="編輯標籤"
                              onClick={() => handleOpenEditTags(video)}
                              className="flex items-center justify-center gap-1.5 py-1 px-2.5 border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 text-[11px] font-bold rounded-lg transition-colors"
                            >
                              <SVGIcon name="ClipboardEdit" className="w-3.5 h-3.5 text-blue-600" />
                              <span>編輯</span>
                            </button>

                            <button
                              onClick={() => {
                                setQuickLogVideo(video);
                                setQuickDuration(video.latestDuration || 15);
                                setQuickDate(new Date().toISOString().split("T")[0]);
                              }}
                              className="flex items-center justify-center gap-1 py-1 px-2.5 bg-blue-600 hover:bg-blue-700 text-white text-[11px] font-bold rounded-lg transition-colors shadow-xs"
                            >
                              <SVGIcon name="Plus" className="w-3.5 h-3.5 text-blue-100" />
                              <span>再次上課</span>
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* 快速打卡視窗 Modal */}
            {quickLogVideo && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex justify-between items-center border-b pb-2">
                    <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <SVGIcon name="Dumbbell" className="w-4 h-4 text-blue-500" />
                      <span>再次上課</span>
                    </span>
                    <button onClick={() => setQuickLogVideo(null)} className="text-slate-450 hover:text-slate-650">✕</button>
                  </div>

                  <div className="bg-slate-50 p-3 rounded-2xl border border-slate-100 flex gap-2.5">
                    <img src={getCleanThumbnail(quickLogVideo.videoThumbnail)} alt="Thumbnail" className="w-16 h-12 object-cover rounded-md" />
                    <p className="text-xs font-bold text-slate-850 leading-tight truncate-3">{quickLogVideo.videoTitle}</p>
                  </div>

                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block">打卡日期</label>
                    <input
                      type="date"
                      value={quickDate}
                      onChange={(e) => setQuickDate(e.target.value)}
                      className="w-full h-10 px-3 border border-slate-200 bg-slate-50/50 rounded-xl text-xs font-sans text-left appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                    />
                  </div>

                  <div className="space-y-1 mt-3">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block">練習時長</label>
                    <input
                      type="number"
                      inputMode="numeric"
                      pattern="[0-9]*"
                      min="1"
                      value={quickDuration}
                      onChange={(e) => setQuickDuration(e.target.value)}
                      className="w-full h-10 px-3 border border-slate-200 bg-slate-50/50 rounded-xl text-xs font-sans text-left appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500/20"
                    />
                  </div>

                  <div className="flex gap-2 pt-1.5">
                    <button onClick={() => setQuickLogVideo(null)} className="flex-grow py-2 bg-slate-100 rounded-xl font-bold text-xs text-slate-650 hover:bg-slate-200">取消</button>
                    <button
                      onClick={handleQuickLogSubmit}
                      disabled={isSubmitting}
                      className="flex-grow py-2 bg-blue-600 text-white rounded-xl font-bold text-xs hover:bg-blue-700"
                    >
                      {isSubmitting ? "正在儲存..." : "再次上課"}
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}

            {/* 編輯標籤視窗 Modal */}
            {editingTagsVideo && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50 overflow-y-auto max-h-[90vh]">
                  <div className="flex justify-between items-center border-b pb-2">
                    <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <SVGIcon name="FileEdit" className="w-4 h-4 text-blue-500" />
                      <span>自訂修改課程資訊</span>
                    </span>
                    <button onClick={() => setEditingTagsVideo(null)} className="text-slate-450 hover:text-slate-650">✕</button>
                  </div>

                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block">課程名稱</label>
                    <input
                      type="text"
                      value={editingVideoTitle}
                      onChange={(e) => setEditingVideoTitle(e.target.value)}
                      placeholder="請輸入課程名稱"
                      className="w-full px-3 py-2 bg-slate-50/50 border rounded-xl text-xs"
                    />
                  </div>

                  <div className="space-y-1">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block">圖片網址</label>
                    <input
                      type="text"
                      value={editingVideoThumbnail}
                      onChange={(e) => setEditingVideoThumbnail(e.target.value)}
                      placeholder="請輸入圖片網址"
                      className="w-full px-3 py-2 bg-slate-50/50 border rounded-xl text-xs"
                    />
                  </div>

                  <div className="space-y-2">
                    <label className="text-[10px] font-bold text-slate-500 uppercase block">分類標籤</label>
                    <div className="grid grid-cols-2 gap-2">
                      {["線上", "實體", "肩頸", "背部", "核心", "臀部", "腿部", "伸展"].map((tag) => {
                        const hasSelected = tagFormSelected.includes(tag);
                        return (
                          <button
                            key={tag}
                            type="button"
                            onClick={() => handleToggleTagInForm(tag)}
                            className={`py-1.5 px-3 rounded-lg border text-xs font-bold transition flex items-center justify-center gap-1 ${
                              hasSelected
                                ? "bg-blue-50 border-blue-200 text-blue-700 w-full"
                                : "bg-white border-slate-200 text-slate-400 hover:bg-slate-50 w-full"
                            }`}
                          >
                            {hasSelected && <span className="text-[10px]">✓</span>}
                            <span>{tag}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  <div className="flex gap-2 pt-2 border-t">
                    <button onClick={() => setEditingTagsVideo(null)} className="flex-1 py-2 bg-slate-100 text-slate-650 rounded-xl font-bold text-xs duration-150">取消</button>
                    <button
                      onClick={handleSaveTags}
                      disabled={isSavingTags}
                      className="flex-1 py-2 bg-blue-600 text-white rounded-xl font-bold text-xs duration-150 shadow-md shadow-blue-100 cursor-pointer"
                    >
                      {isSavingTags ? "儲存中..." : "儲存設定"}
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}
          </div>
        );
      }

      /**
       * 應用程式的主元件 (Root Component)
       */
      function App() {
        const [logs, setLogs] = useState([]);
        const [menstrualDates, setMenstrualDates] = useState([]);
        const [loading, setLoading] = useState(true);
        const [activeTab, setActiveTab] = useState("check-in");
        const [showDataModal, setShowDataModal] = useState(false);

        // 初始化選擇的日期 (預設為今天)
        const [selectedDate, setSelectedDate] = useState(() => {
          const today = new Date();
          const yyyy = today.getFullYear();
          const mm = String(today.getMonth() + 1).padStart(2, "0");
          const dd = String(today.getDate()).padStart(2, "0");
          return `${yyyy}-${mm}-${dd}`;
        });

        // 啟動時從 LocalStorage 載入資料
        useEffect(() => {
          try {
            const storedLogs = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (storedLogs) {
              const parsed = JSON.parse(storedLogs);
              parsed.sort((a, b) => {
                const datesDiff = b.date.localeCompare(a.date);
                if (datesDiff !== 0) return datesDiff;
                return b.createdAt - a.createdAt;
              });
              setLogs(parsed);
            }
            
            const storedMenstrual = localStorage.getItem(MENSTRUAL_STORAGE_KEY);
            if (storedMenstrual) {
              setMenstrualDates(JSON.parse(storedMenstrual));
            }
          } catch (e) {
            console.error(e);
          } finally {
            setLoading(false);
          }
        }, []);

        // 將目前所有資料打包並匯出為 JSON 檔
        const handleExportData = () => {
          try {
            const dataToExport = {
              logs: logs,
              pinned: JSON.parse(localStorage.getItem(PIN_STORAGE_KEY) || "[]"),
              menstrual: menstrualDates
            };
            const dataStr = JSON.stringify(dataToExport, null, 2);
            const dataBlob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `pilates_backup_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          } catch (e) {
            alert("匯出失敗：" + e.message);
          }
        };

        // 從 JSON 檔還原匯入資料
        const handleImportData = (event) => {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const importedData = JSON.parse(e.target.result);
              if (importedData && importedData.logs) {
                if (window.confirm("匯入將會覆蓋目前所有資料，確定要繼續嗎？")) {
                  localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(importedData.logs));
                  if (importedData.pinned) {
                    localStorage.setItem(PIN_STORAGE_KEY, JSON.stringify(importedData.pinned));
                  }
                  if (importedData.menstrual) {
                    localStorage.setItem(MENSTRUAL_STORAGE_KEY, JSON.stringify(importedData.menstrual));
                  }
                  
                  alert("匯入成功");
                  window.location.reload();
                }
              } else {
                alert("檔案格式不正確，請選擇正確的 .json 檔");
              }
            } catch (error) {
              alert("讀取檔案失敗：" + error.message);
            }
          };
          reader.readAsText(file);
          event.target.value = '';
        };

        // 新增與更新資料的輔助函式
        const addLog = async (logData) => {
          const id = "log_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9);
          const createdAt = Date.now();
          const newLog = { ...logData, id, createdAt };

          setLogs((prevLogs) => {
            const updated = [newLog, ...prevLogs].sort((a, b) => {
              const dd = b.date.localeCompare(a.date);
              if (dd !== 0) return dd;
              return b.createdAt - a.createdAt;
            });
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated));
            return updated;
          });
        };

        const deleteLog = async (id) => {
          setLogs((prevLogs) => {
            const updated = prevLogs.filter(l => l.id !== id);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated));
            return updated;
          });
        };

        const updateLog = async (id, fields) => {
          setLogs((prevLogs) => {
            const updated = prevLogs.map(l => l.id === id ? { ...l, ...fields } : l);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(updated));
            return updated;
          });
        };

        const toggleMenstrualDate = (dateStr) => {
          setMenstrualDates((prev) => {
            const next = prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr];
            localStorage.setItem(MENSTRUAL_STORAGE_KEY, JSON.stringify(next));
            return next;
          });
        };

        return (
          <div className="min-h-screen pb-16 font-sans relative overflow-hidden">
            {/* 網頁背景視覺效果 */}
            <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-pink-200/50 blur-[130px] rounded-full pointer-events-none z-0"></div>
            <div className="absolute bottom-[5%] right-[-10%] w-[60%] h-[60%] bg-blue-100/40 blur-[140px] rounded-full pointer-events-none z-0"></div>
            <div className="absolute top-[25%] right-[10%] w-[40%] h-[40%] bg-amber-100/40 blur-[110px] rounded-full pointer-events-none z-0"></div>

            {/* 頂部導覽列 */}
            <header className="fixed top-0 left-0 right-0 z-40 bg-white/40 backdrop-blur-xl border-b border-white/60 shadow-xs">
              <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between relative z-10">
                
                <button
                  onClick={() => setShowDataModal(true)}
                  className="flex items-center gap-2.5 text-left cursor-pointer group focus:outline-none"
                  title="資料備份與匯出匯入"
                >
                  <div className="p-2 bg-blue-600 group-hover:bg-blue-700 transition text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 scale-100 active:scale-95 duration-150">
                    <SVGIcon name="Flower" className="w-5 h-5 text-blue-100" />
                  </div>
                  <h1 className="text-sm font-extrabold text-slate-900 tracking-tight group-hover:text-blue-900 transition">皮拉提斯訓練紀錄</h1>
                </button>

                <div className="bg-white/60 backdrop-blur-md border border-white/85 p-1 rounded-xl flex items-center gap-1 shadow-2xs">
                  <button
                    onClick={() => setActiveTab("check-in")}
                    className={`p-2 rounded-lg transition-all cursor-pointer flex items-center justify-center ${
                      activeTab === "check-in"
                        ? "bg-white text-blue-600 shadow-xs scale-102 border border-white/80"
                        : "text-slate-500 hover:text-slate-800"
                    }`}
                    title="打卡牆"
                  >
                    <SVGIcon name="CalendarDays" className="w-10 h-4" />
                  </button>
                  <button
                    onClick={() => setActiveTab("videos")}
                    className={`p-2 rounded-lg transition-all cursor-pointer flex items-center justify-center ${
                      activeTab === "videos"
                        ? "bg-white text-blue-600 shadow-xs scale-102 border border-white/80"
                        : "text-slate-500 hover:text-slate-800"
                    }`}
                    title="課程庫"
                  >
                    <SVGIcon name="Video" className="w-10 h-4" />
                  </button>
                </div>
              </div>
            </header>

            {/* 主要內容區塊 */}
            <main className="max-w-7xl mx-auto px-4 md:px-6 pt-[85px] pb-8 relative z-10">
              {loading ? (
                <div className="py-24 text-center space-y-4">
                  <div className="inline-block p-4 bg-white/60 backdrop-blur-md border border-white/80 rounded-3xl shadow-xs">
                    <div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                  </div>
                  <p className="text-xs font-bold text-slate-755">正在準備您的運動日誌模組...</p>
                </div>
              ) : (
                <div className="animate-fade-in">
                  {/* 切換頁面視圖 */}
                  {activeTab === "check-in" ? (
                    <CheckInPage
                      logs={logs}
                      onAddLog={addLog}
                      onDeleteLog={deleteLog}
                      onUpdateLog={updateLog}
                      selectedDate={selectedDate}
                      onSelectDate={setSelectedDate}
                      menstrualDates={menstrualDates}
                      onToggleMenstrualDate={toggleMenstrualDate}
                    />
                  ) : (
                    <VideoRecordsPage
                      logs={logs}
                      onQuickCheckIn={addLog}
                      onUpdateLog={updateLog}
                    />
                  )}
                </div>
              )}
            </main>

            {/* 備份與還原視窗 Modal */}
            {showDataModal && ReactDOM.createPortal(
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] flex items-center justify-center p-4 z-50 animate-fade-in">
                <div className="bg-white rounded-[2rem] p-6 max-w-sm w-full space-y-4 shadow-xl border border-slate-150 relative z-50">
                  <div className="flex justify-between items-center border-b pb-2">
                    <span className="text-xs font-bold text-slate-700 flex items-center gap-1.5">
                      <span>資料備份與還原</span>
                    </span>
                    <button onClick={() => setShowDataModal(false)} className="text-slate-450 hover:text-slate-650">✕</button>
                  </div>

                  <div className="space-y-4">
                    <div className="space-y-2.5 pt-1">
                      <button
                        onClick={handleExportData}
                        className="w-full py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2 cursor-pointer shadow-sm">
                        <span>匯出資料</span>
                      </button>

                      <label className="w-full py-2.5 bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 rounded-xl font-bold text-xs transition flex items-center justify-center gap-2 cursor-pointer shadow-sm">
                        <span>匯入資料</span>
                        <input
                          type="file"
                          accept=".json"
                          className="hidden"
                          onChange={handleImportData}
                        />
                      </label>
                      
                      <p className="text-[9px] text-rose-500 text-center font-bold mt-1">
                        匯入全新檔案會覆寫目前畫面上所有的紀錄
                      </p>
                    </div>
                  </div>
                </div>
              </div>,
              document.body
            )}
            
          </div>
        );
      }

      /**
       * 初始化 React 掛載點
       */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
